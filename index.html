<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adega 51 - Estoque</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center; }
    input, button {
      padding:10px; margin:5px; border-radius:8px; border:none;
    }
    button { background:#ff3b3b; color:#fff; cursor:pointer; }
    .card {
      background:#222; margin:10px auto; padding:10px;
      width:90%; max-width:400px; border-radius:10px;
    }
  </style>
</head>

<body>

<h2>🍺 Adega 51 - Estoque</h2>

<input id="nome" placeholder="Nome da bebida">
<input id="qtd" type="number" placeholder="Quantidade">
<button onclick="adicionar()">Adicionar</button>

<div id="lista"></div>

<script type="module">
  // Firebase (modular)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // SUA CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyAGoMZmThe9MyEEv0NPnVP3VHGIXWM4OLs",
    authDomain: "area-51-e8547.firebaseapp.com",
    projectId: "area-51-e8547",
    storageBucket: "area-51-e8547.firebasestorage.app",
    messagingSenderId: "803192120199",
    appId: "1:803192120199:web:8e08ea4aa1207bc2512922"
  };

  // INIT
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const lista = document.getElementById("lista");

  // ADICIONAR PRODUTO
  window.adicionar = async function () {
    const nome = document.getElementById("nome").value;
    const qtd = parseInt(document.getElementById("qtd").value);

    if (!nome || !qtd) return alert("Preencha tudo");

    await addDoc(collection(db, "estoque"), {
      nome,
      qtd
    });

    document.getElementById("nome").value = "";
    document.getElementById("qtd").value = "";
  }

  // TEMPO REAL (SINCRONIZA COM TODOS CELULARES)
  onSnapshot(collection(db, "estoque"), (snapshot) => {
    lista.innerHTML = "";

    snapshot.forEach((doc) => {
      const item = doc.data();

      lista.innerHTML += `
        <div class="card">
          <h3>${item.nome}</h3>
          <p>Quantidade: ${item.qtd}</p>
        </div>
      `;
    });
  });

</script>

</body>
</html>
