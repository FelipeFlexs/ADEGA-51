<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 SUA CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAGoMZmThe9MyEEv0NPnVP3VHGIXWM4OLs",
  authDomain: "area-51-e8547.firebaseapp.com",
  projectId: "area-51-e8547",
  storageBucket: "area-51-e8547.firebasestorage.app",
  messagingSenderId: "803192120199",
  appId: "1:803192120199:web:8e08ea4aa1207bc2512922"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ====== VENDAS EM TEMPO REAL ======
window.addVenda = async function(produto, valor) {
  const operador = document.getElementById("operador").value;

  await addDoc(collection(db, "vendas"), {
    produto,
    valor,
    operador,
    hora: new Date().toLocaleString("pt-BR")
  });
};

// ====== DESPESAS ======
window.addDespesa = async function() {
  const descricao = document.getElementById("descricaoDespesa").value;
  const valor = Number(document.getElementById("valorDespesa").value);

  if (!valor) return;

  await addDoc(collection(db, "despesas"), {
    descricao,
    valor,
    hora: new Date().toLocaleString("pt-BR")
  });
};

// ====== LISTA VENDAS ======
onSnapshot(collection(db, "vendas"), (snapshot) => {
  vendas = [];

  snapshot.forEach((d) => {
    vendas.push({ id: d.id, ...d.data() });
  });

  renderHistorico();
  atualizarDashboard();
});

// ====== LISTA DESPESAS ======
onSnapshot(collection(db, "despesas"), (snapshot) => {
  despesas = [];

  snapshot.forEach((d) => {
    despesas.push({ id: d.id, ...d.data() });
  });

  renderDespesas();
  atualizarDashboard();
});

// ====== EXCLUIR VENDA ======
window.excluirVenda = async function(id) {
  if (confirm("Deseja excluir esta venda?")) {
    await deleteDoc(doc(db, "vendas", id));
  }
};
</script>
